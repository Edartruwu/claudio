{{define "login.html"}}{{template "layout" .}}{{end}}

{{define "content"}}
<div class="flex flex-col items-center justify-center min-h-screen px-4" style="background:#000000;">
  <div class="rounded-2xl p-8 w-full max-w-sm" style="background:#1C1C1E;">
    <div class="text-center mb-6">
      <div class="rounded-full flex items-center justify-center mx-auto mb-3" style="width:64px;height:64px;background:#25D366;">
        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.52 3.66 1.43 5.18L2 22l4.93-1.41A9.953 9.953 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">ComandCenter</h1>
      <p class="text-sm mt-1" style="color:#8E8E93;">AI Session Manager</p>
    </div>

    {{with .Error}}{{if .}}
    <div class="rounded-lg px-4 py-2 mb-4 text-sm" style="background:#3A1C1C;border:1px solid #5C2626;color:#FF6B6B;">
      {{.}}
    </div>
    {{end}}{{end}}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1" style="color:#8E8E93;">Password</label>
        <input
          type="password"
          name="password"
          placeholder="Enter password"
          autofocus
          class="w-full rounded-lg px-4 py-2 text-base outline-none text-white"
          style="background:#2C2C2E;border:1px solid #3A3A3C;"
        >
      </div>
      <button
        type="submit"
        class="w-full text-white rounded-lg py-2 font-semibold text-sm"
        style="background:#25D366;"
      >
        Sign In
      </button>
    </form>
  </div>
</div>
{{end}}
