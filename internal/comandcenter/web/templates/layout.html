{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/static/manifest.json">
  <title>ComandCenter</title>
  <link rel="stylesheet" href="/static/vendor/tailwind.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    body { max-width: 480px; margin: 0 auto; background: #000000; padding-top: env(safe-area-inset-top); }
    .msg-bubble-assistant { background: #1C1C1E; border-radius: 0 12px 12px 12px; }
    .msg-bubble-user { background: #075E54; border-radius: 12px 0 12px 12px; color: #FFFFFF; }
    .msg-bubble-tool { background: #2C2C2E; border-radius: 8px; font-style: italic; font-size: 0.75rem; }
    #messages { scroll-behavior: smooth; }
    .chat-header { padding-top: env(safe-area-inset-top); }
    .input-bar { padding-bottom: env(safe-area-inset-bottom); }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-black text-white min-h-screen overflow-x-hidden" {{if .SessionID}}data-session-id="{{.SessionID}}"{{end}}>
  {{block "content" .}}{{end}}
  <script src="/static/app.js"></script>
</body>
</html>
{{end}}
