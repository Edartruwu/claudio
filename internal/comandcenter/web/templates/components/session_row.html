{{define "session-row"}}
<div class="swipe-row" data-session-id="{{.Session.ID}}"
     style="position:relative;overflow:hidden;border-bottom:1px solid #2C2C2E;background:#161717;{{if ne .Session.Status "active"}}opacity:0.5;{{end}}">
  <div class="swipe-actions" aria-hidden="true"
       style="position:absolute;right:0;top:0;bottom:0;display:flex;width:160px;z-index:0;">
    <button hx-patch="/api/sessions/{{.Session.ID}}/archive" hx-target="closest .swipe-row" hx-swap="outerHTML"
      style="width:80px;background:#25D366;border:none;cursor:pointer;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0;font-family:inherit;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 11a2 2 0 002 2h8a2 2 0 002-2l1-11M10 12v4m4-4v4"/></svg>
      <span style="font-size:11px;font-weight:600;">Archive</span>
    </button>
    <button hx-delete="/api/sessions/{{.Session.ID}}" hx-target="closest .swipe-row" hx-swap="outerHTML" hx-confirm="Delete this session and all messages?"
      style="width:80px;background:#FF3B30;border:none;cursor:pointer;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:0;font-family:inherit;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      <span style="font-size:11px;font-weight:600;">Delete</span>
    </button>
  </div>
  <div class="swipe-content"
       style="position:relative;z-index:1;background:#161717;transform:translateX(0);transition:transform 0.2s ease;will-change:transform;" class="swipe-content">
    <div class="row-menu" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);z-index:10;">
      <button class="row-menu-trigger" onclick="ccToggleRowMenu(this,event)"
              style="width:32px;height:32px;border-radius:50%;background:rgba(44,44,46,0.92);border:none;cursor:pointer;color:#8E8E93;font-size:18px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;font-family:inherit;">⋯</button>
      <div class="row-menu-dropdown"
           style="position:absolute;right:0;top:calc(100% + 4px);background:#1C1C1E;border-radius:12px;overflow:hidden;min-width:160px;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);z-index:200;">
        <button hx-patch="/api/sessions/{{.Session.ID}}/archive" hx-target="closest .swipe-row" hx-swap="outerHTML"
          style="width:100%;padding:14px 16px;background:none;border:none;border-bottom:1px solid #2C2C2E;cursor:pointer;color:#25D366;text-align:left;font-size:15px;font-family:inherit;display:block;">Archive</button>
        <button hx-delete="/api/sessions/{{.Session.ID}}" hx-target="closest .swipe-row" hx-swap="outerHTML" hx-confirm="Delete this session and all messages?"
          style="width:100%;padding:14px 16px;background:none;border:none;cursor:pointer;color:#FF3B30;text-align:left;font-size:15px;font-family:inherit;display:block;">Delete</button>
      </div>
    </div>
    <a href="/chat/{{.Session.ID}}" style="height:76px;display:flex;align-items:center;padding:0 16px;">
      <div style="position:relative;flex-shrink:0;margin-right:12px;">
        <div style="width:56px;height:56px;background:{{avatarColor .Session.Name}};border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <span style="color:#fff;font-size:1.25rem;font-weight:600;">{{firstChar .Session.Name}}</span>
        </div>
        {{if eq .Session.Status "active"}}
        <span style="position:absolute;bottom:0;right:0;width:14px;height:14px;background:#25D366;border:2px solid #000;border-radius:50%;"></span>
        {{end}}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">
          <span style="font-size:17px;color:#fff;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{if .Session.Master}}★ {{end}}{{.Session.Name}}</span>
          <span style="font-size:13px;margin-left:8px;flex-shrink:0;color:{{if .UnreadCount}}#25D366{{else}}#8E8E93{{end}};">{{relTime .Session.LastActiveAt}}</span>
        </div>
        <div style="margin-top:2px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:15px;color:#8E8E93;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{if .LastMessage}}{{.LastMessage}}{{else}}No messages{{end}}</span>
          {{if .UnreadCount}}
          <span style="background:#25D366;min-width:20px;height:20px;padding:0 6px;border-radius:9999px;color:#fff;font-size:0.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-left:8px;flex-shrink:0;">{{.UnreadCount}}</span>
          {{end}}
        </div>
      </div>
    </a>
  </div>
</div>
{{end}}
