{{define "session-row"}}
<a href="/chat/{{.Session.ID}}"
   class="flex items-center px-4" style="height:76px;border-bottom:1px solid #2C2C2E;background:#000000;">
  <!-- Avatar 56px circle -->
  <div class="rounded-full flex items-center justify-center flex-shrink-0 mr-3" style="width:56px;height:56px;background:{{avatarColor .Session.Name}};">
    <span class="text-white font-semibold text-xl">{{firstChar .Session.Name}}</span>
  </div>
  <!-- Content -->
  <div class="flex-1 min-w-0">
    <div class="flex justify-between items-baseline">
      <span class="text-white font-semibold truncate" style="font-size:17px;">{{if .Session.Master}}★ {{end}}{{.Session.Name}}</span>
      <span class="ml-2 flex-shrink-0" style="font-size:13px;color:{{if .UnreadCount}}#25D366{{else}}#8E8E93{{end}};">{{relTime .Session.LastActiveAt}}</span>
    </div>
    <div class="flex justify-between items-center" style="margin-top:2px;">
      <span class="truncate" style="font-size:15px;color:#8E8E93;">
        {{if .LastMessage}}{{.LastMessage}}{{else}}No messages{{end}}
      </span>
      {{if .UnreadCount}}
      <span class="text-white text-xs font-bold rounded-full flex items-center justify-center ml-2 flex-shrink-0" style="background:#25D366;min-width:20px;height:20px;padding:0 6px;">{{.UnreadCount}}</span>
      {{end}}
    </div>
  </div>
</a>
{{end}}
