{{define "message-bubble"}}
{{if eq .Role "tool_use"}}
<div class="flex justify-center my-1">
  <div class="msg-bubble-tool px-3 py-1 max-w-xs" style="color:#8E8E93;">
    🔧 {{truncate 80 .Content}}
    {{if .AgentName}}<span style="color:#636366;"> — {{.AgentName}}</span>{{end}}
  </div>
</div>
{{else if eq .Role "user"}}
<div class="flex justify-end mb-1">
  <div class="msg-bubble-user px-4 py-2 max-w-xs shadow-sm">
    <p class="text-sm leading-relaxed whitespace-pre-wrap text-white">{{.Content}}</p>
    <p class="text-xs text-right mt-1" style="color:rgba(255,255,255,0.6);">{{relTime .CreatedAt}}</p>
  </div>
</div>
{{else}}
<div class="flex justify-start mb-1">
  <div class="msg-bubble-assistant px-4 py-2 max-w-xs shadow-sm">
    {{if .AgentName}}<p class="text-xs font-semibold mb-1" style="color:#25D366;">{{.AgentName}}</p>{{end}}
    <p class="text-sm leading-relaxed whitespace-pre-wrap text-white">{{.Content}}</p>
    <p class="text-xs mt-1" style="color:#8E8E93;">{{relTime .CreatedAt}}</p>
  </div>
</div>
{{end}}
{{end}}
