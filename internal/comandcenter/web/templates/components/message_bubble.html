{{define "message-bubble"}}
{{if eq .Role "tool_use"}}
<div class="flex justify-center my-1">
  <div class="msg-bubble-tool px-3 py-1 max-w-xs text-gray-500">
    🔧 {{truncate 80 .Content}}
    {{if .AgentName}}<span class="text-gray-400"> — {{.AgentName}}</span>{{end}}
  </div>
</div>
{{else if eq .Role "user"}}
<div class="flex justify-end mb-1">
  <div class="msg-bubble-user px-4 py-2 max-w-xs shadow-sm">
    <p class="text-sm leading-relaxed whitespace-pre-wrap">{{.Content}}</p>
    <p class="text-xs opacity-70 text-right mt-1">{{relTime .CreatedAt}}</p>
  </div>
</div>
{{else}}
<div class="flex justify-start mb-1">
  <div class="msg-bubble-assistant px-4 py-2 max-w-xs shadow-sm">
    {{if .AgentName}}<p class="text-xs font-semibold text-green-700 mb-1">{{.AgentName}}</p>{{end}}
    <p class="text-sm leading-relaxed whitespace-pre-wrap text-gray-800">{{.Content}}</p>
    <p class="text-xs text-gray-400 mt-1">{{relTime .CreatedAt}}</p>
  </div>
</div>
{{end}}
{{end}}
