{{define "chat_list.html"}}{{template "layout" .}}{{end}}

{{define "sidebar"}}
<div class="flex flex-col h-full" style="background:#161717;">
  <!-- Header -->
  <div class="chat-header flex-shrink-0" style="background:#1C1C1E;">
    <div class="flex justify-between items-center px-4 pt-3 pb-2">
      <h1 class="text-white font-bold" style="font-size:34px;line-height:1.1;">ComandCenter</h1>
      <div class="flex items-center gap-2">
        <!-- Designs link -->
        <a href="/designs" class="flex items-center justify-center rounded-full" style="width:44px;height:44px;background:#2C2C2E;" title="Designs">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 15l-5-5L5 21"/>
          </svg>
        </a>
        <!-- New session button -->
        <a href="/" class="flex items-center justify-center rounded-full" style="width:44px;height:44px;background:#25D366;">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
        </a>
      </div>
    </div>
    <!-- Search bar -->
    <div class="px-4 pb-2">
      <div class="flex items-center rounded-lg px-3" style="background:#2C2C2E;height:36px;border-radius:10px;">
        <svg class="w-4 h-4 mr-2 flex-shrink-0" style="color:#8E8E93;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" placeholder="Search" class="bg-transparent text-white text-base flex-1 outline-none" style="color:#FFFFFF;" />
      </div>
    </div>
    <!-- Filter chips -->
    <div id="filter-chips" class="flex gap-2 px-4 pb-3 overflow-x-auto no-scrollbar">
      <button data-filter-chip=""
        onclick="ccSetFilter('');htmx.ajax('GET','/partials/sessions?filter=',{target:'#session-list',swap:'innerHTML'})"
        class="text-white font-medium rounded-full whitespace-nowrap" style="font-size:13px;padding:6px 16px;background:#25D366;">All</button>
      <button data-filter-chip="active"
        onclick="ccSetFilter('active');htmx.ajax('GET','/partials/sessions?filter=active',{target:'#session-list',swap:'innerHTML'})"
        class="text-white font-medium rounded-full whitespace-nowrap" style="font-size:13px;padding:6px 16px;background:#2C2C2E;">Active</button>
      <button data-filter-chip="inactive"
        onclick="ccSetFilter('inactive');htmx.ajax('GET','/partials/sessions?filter=inactive',{target:'#session-list',swap:'innerHTML'})"
        class="text-white font-medium rounded-full whitespace-nowrap" style="font-size:13px;padding:6px 16px;background:#2C2C2E;">Inactive</button>
      <!-- Project chips injected by JS below -->
    </div>
    <script>
    (function() {
      function loadProjectChips() {
        fetch('/api/projects').then(function(r){ return r.json(); }).then(function(projects) {
          var bar = document.getElementById('filter-chips');
          if (!bar) return;
          // Remove old project chips.
          bar.querySelectorAll('[data-project-chip]').forEach(function(el){ el.remove(); });
          projects.forEach(function(p) {
            var f = 'project:' + p.path;
            var btn = document.createElement('button');
            btn.dataset.filterChip = f;
            btn.dataset.projectChip = '1';
            btn.className = 'text-white font-medium rounded-full whitespace-nowrap flex items-center gap-1';
            btn.style.cssText = 'font-size:13px;padding:6px 16px;background:#2C2C2E;';
            btn.innerHTML = '<svg style="width:12px;height:12px;flex-shrink:0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg>'
              + '<span>' + p.name + '</span>'
              + '<span style="font-size:11px;opacity:.6;margin-left:2px;">' + p.count + '</span>';
            btn.onclick = function() {
              ccSetFilter(f);
              htmx.ajax('GET', '/partials/sessions?filter=' + encodeURIComponent(f), {target:'#session-list', swap:'innerHTML'});
            };
            bar.appendChild(btn);
          });
        }).catch(function(){});
      }
      loadProjectChips();
      // Refresh project chips every 10s in case new sessions appear.
      setInterval(loadProjectChips, 10000);
    })();
    </script>
  </div>

  <!-- Session List -->
  <main class="flex-1 overflow-y-auto">
    <div id="session-list"
         hx-get="/partials/sessions"
         hx-trigger="every 3s"
         hx-swap="innerHTML"
         hx-indicator=".htmx-indicator">
      {{range .Rows}}
        {{template "session-row" .}}
      {{else}}
        <!-- Empty state -->
        <div class="flex flex-col items-center justify-center py-20">
          <svg class="mb-3" style="width:40px;height:40px;color:#8E8E93;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <p style="color:#8E8E93;font-size:15px;">No sessions yet</p>
        </div>
      {{end}}
    </div>
    <span class="htmx-indicator block text-center text-xs py-1" style="color:#8E8E93;">↻</span>
  </main>

  <!-- Bottom tab bar — mobile only -->
  <nav class="md:hidden flex flex-shrink-0" style="background:#1C1C1E;border-top:1px solid #2C2C2E;padding-bottom:env(safe-area-inset-bottom);">
    <a href="/" class="flex-1 flex flex-col items-center py-2" style="color:#25D366;">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/>
        <path d="M7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/>
      </svg>
      <span style="font-size:10px;" class="mt-1">Sessions</span>
    </a>
    <a href="/designs" class="flex-1 flex flex-col items-center py-2" style="color:#8E8E93;">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        <path d="M0 0h24v24H0z" fill="none"/>
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z" fill="none"/>
        <path d="M21 3H3v18h18V3zm-10 14H9V7h2v10zm4 0h-2V7h2v10z" fill="none"/>
        <path d="M20.97 8.23l-7.02-5.27c-.57-.43-1.32-.43-1.89 0L4.97 8.23C4.37 8.67 4 9.38 4 10.14V20c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-9.86c0-.76-.37-1.47-.97-1.91zM12 13c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm0-4c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/>
      </svg>
      <span style="font-size:10px;" class="mt-1">Designs</span>
    </a>
    <a href="/" class="flex-1 flex flex-col items-center py-2" style="color:#8E8E93;">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      <span style="font-size:10px;" class="mt-1">Contacts</span>
    </a>
    <a href="/" class="flex-1 flex flex-col items-center py-2" style="color:#8E8E93;">
      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/>
      </svg>
      <span style="font-size:10px;" class="mt-1">Settings</span>
    </a>
  </nav>
</div>
{{end}}
