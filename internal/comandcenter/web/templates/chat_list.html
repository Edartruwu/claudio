{{define "chat_list.html"}}{{template "layout" .}}{{end}}

{{define "content"}}
<div class="flex flex-col h-screen bg-white">
  <!-- Header (chat-header adds safe-area-inset-top padding) -->
  <header class="chat-header whatsapp-green text-white px-4 py-3 flex items-center justify-between shadow-md flex-shrink-0">
    <h1 class="text-xl font-bold tracking-wide">ComandCenter</h1>
    <div class="flex items-center gap-1">
      <!-- Search icon — touch target ≥44px -->
      <button class="min-w-[44px] min-h-[44px] flex items-center justify-center opacity-80 text-white bg-transparent border-none">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </button>
      <!-- Menu icon — touch target ≥44px -->
      <button class="min-w-[44px] min-h-[44px] flex items-center justify-center opacity-80 text-white bg-transparent border-none">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Search bar -->
  <div class="bg-gray-50 px-3 py-2 flex-shrink-0">
    <div class="flex items-center bg-white rounded-full px-4 py-2 shadow-sm border border-gray-200">
      <svg class="w-4 h-4 text-gray-400 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="search" placeholder="Search sessions…" class="flex-1 text-base outline-none bg-transparent text-gray-700 placeholder-gray-400">
    </div>
  </div>

  <!-- Session List -->
  <main class="flex-1 overflow-y-auto">
    <div class="px-4 py-2">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest">AI Sessions</p>
    </div>
    <div id="session-list"
         hx-get="/partials/sessions"
         hx-trigger="every 3s"
         hx-swap="innerHTML"
         hx-indicator=".htmx-indicator">
      {{range .Rows}}
        {{template "session-row" .}}
      {{else}}
        <div class="px-4 py-8 text-center text-gray-400 text-sm">No active sessions</div>
      {{end}}
    </div>
    <span class="htmx-indicator block text-center text-xs text-gray-400 py-1">↻</span>
  </main>
</div>
{{end}}
